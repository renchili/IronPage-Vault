apiVersion: apps/v1
kind: Deployment
metadata:
  name: ironpage-vault
  namespace: ironpage
  labels:
    app.kubernetes.io/name: ironpage-vault
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ironpage-vault
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ironpage-vault
    spec:
      containers:
        - name: ironpage-vault
          image: ironpage-vault:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: ironpage-config
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
          volumeMounts:
            - name: ironpage-data
              mountPath: /var/lib/ironpage
      volumes:
        - name: ironpage-data
          persistentVolumeClaim:
            claimName: ironpage-data
