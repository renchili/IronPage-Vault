AWSTemplateFormatVersion: '2010-09-09'
Description: IronPage Vault ECS Fargate serverless-container deployment skeleton.

Parameters:
  ImageUri:
    Type: String
  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
  SecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id
  EcsClusterName:
    Type: String
    Default: ironpage-vault
  EfsFileSystemId:
    Type: String
  DbHost:
    Type: String
  DbPort:
    Type: Number
    Default: 5432
  DbName:
    Type: String
    Default: ironpage
  DbUser:
    Type: String
    Default: ironpage
  DbPassword:
    Type: String
    NoEcho: true
  DesiredCount:
    Type: Number
    Default: 1
  Cpu:
    Type: String
    Default: '1024'
  Memory:
    Type: String
    Default: '2048'

Resources:
  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /ironpage-vault/serverless
      RetentionInDays: 30

  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: ironpage-vault
      RequiresCompatibilities:
        - FARGATE
      NetworkMode: awsvpc
      Cpu: !Ref Cpu
      Memory: !Ref Memory
      Volumes:
        - Name: ironpage-data
          EFSVolumeConfiguration:
            FilesystemId: !Ref EfsFileSystemId
            TransitEncryption: ENABLED
      ContainerDefinitions:
        - Name: ironpage-vault
          Image: !Ref ImageUri
          Essential: true
          PortMappings:
            - ContainerPort: 8080
              Protocol: tcp
          MountPoints:
            - SourceVolume: ironpage-data
              ContainerPath: /var/lib/ironpage
          Environment:
            - Name: DB_HOST
              Value: !Ref DbHost
            - Name: DB_PORT
              Value: !Sub '${DbPort}'
            - Name: DB_NAME
              Value: !Ref DbName
            - Name: DB_USER
              Value: !Ref DbUser
            - Name: DB_PASSWORD
              Value: !Ref DbPassword
            - Name: STORAGE_DIR
              Value: /var/lib/ironpage/storage
            - Name: BACKUP_DIR
              Value: /var/lib/ironpage/backups
            - Name: MIGRATIONS_DIR
              Value: /opt/ironpage/migrations
            - Name: PUBLIC_DIR
              Value: /opt/ironpage/public
            - Name: HTTP_ADDR
              Value: :8080
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ironpage

  Service:
    Type: AWS::ECS::Service
    Properties:
      Cluster: !Ref EcsClusterName
      DesiredCount: !Ref DesiredCount
      LaunchType: FARGATE
      TaskDefinition: !Ref TaskDefinition
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          Subnets: !Ref SubnetIds
          SecurityGroups:
            - !Ref SecurityGroupId

Outputs:
  TaskDefinitionArn:
    Value: !Ref TaskDefinition
  ServiceName:
    Value: !Ref Service
  LogGroupName:
    Value: !Ref LogGroup
