name: Pre-merge Full Regression

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: pre-merge-regression-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  full-regression:
    name: Full regression gate
    uses: ./.github/workflows/full-regression-reusable.yml
    with:
      artifact_name: pre-merge-regression-pr-${{ github.event.pull_request.number }}-${{ github.sha }}-${{ github.run_id }}
      record_summary: false
