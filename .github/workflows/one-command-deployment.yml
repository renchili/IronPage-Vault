name: One-Command Deployment Acceptance

on:
  pull_request:
    paths:
      - '.github/workflows/one-command-deployment.yml'
      - 'Dockerfile'
      - 'docker-compose.yml'
      - '.dockerignore'
      - 'scripts/deploy.sh'
      - 'scripts/entrypoint.sh'
      - 'API_tests/test_bootstrap_restart_docker.sh'
      - 'internal/app/config.go'
      - 'internal/app/database.go'
      - 'migrations/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: one-command-deployment-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  one-command-deployment:
    name: Build and exercise one-command deployment
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Build Compose service
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/one-command-deployment
          random_hex() {
            od -An -N32 -tx1 /dev/urandom | tr -d ' \n'
          }
          DB_PASSWORD="$(random_hex)"
          JWT_SECRET="$(random_hex)"
          AES_KEY="$(random_hex)"
          export DB_PASSWORD JWT_SECRET AES_KEY
          docker compose build ironpage 2>&1 | tee artifacts/one-command-deployment/build.log
      - name: Exercise generated configuration, login, rerun, and restart
        shell: bash
        run: |
          set -o pipefail
          bash API_tests/test_bootstrap_restart_docker.sh 2>&1 | tee artifacts/one-command-deployment/acceptance.log
      - name: Upload one-command deployment evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: one-command-deployment-${{ github.run_id }}-${{ github.sha }}
          path: artifacts/one-command-deployment/**
          if-no-files-found: error
          retention-days: 30
