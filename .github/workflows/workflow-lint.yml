name: Workflow Definition Check

on:
  pull_request:
    paths:
      - '.github/workflows/**'

permissions:
  contents: read

jobs:
  actionlint:
    name: Validate GitHub Actions workflows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Install actionlint
        run: go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.7
      - name: Lint all workflow definitions
        id: lint
        shell: bash
        run: |
          set +e
          "$(go env GOPATH)/bin/actionlint" -color=false 2>&1 | tee actionlint.log
          status=${PIPESTATUS[0]}
          echo "status=${status}" >> "$GITHUB_OUTPUT"
          exit "$status"
      - name: Upload actionlint output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: actionlint-${{ github.sha }}-${{ github.run_id }}
          path: actionlint.log
          if-no-files-found: error
          retention-days: 90
