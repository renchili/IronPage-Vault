name: Merge Queue Regression

on:
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: merge-queue-regression-${{ github.ref }}
  cancel-in-progress: true

jobs:
  regression:
    name: Regression on merge candidate
    uses: ./.github/workflows/full-regression-reusable.yml
    with:
      artifact_name: merge-candidate-regression-${{ github.sha }}-${{ github.run_id }}
      record_summary: false
