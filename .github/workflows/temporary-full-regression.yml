name: Temporary Current Main Full Regression

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/temporary-full-regression.yml'

permissions:
  contents: read

jobs:
  full-regression:
    name: Current main full regression
    uses: ./.github/workflows/full-regression-reusable.yml
    with:
      artifact_name: current-main-full-regression-${{ github.sha }}-${{ github.run_id }}
      record_summary: true
