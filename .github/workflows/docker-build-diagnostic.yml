name: Docker Build Diagnostic

on:
  pull_request:
    paths:
      - 'Dockerfile'
      - '.dockerignore'
      - 'go.mod'
      - 'cmd/**'
      - 'internal/**'
      - 'scripts/**'
      - 'migrations/**'
      - 'public/**'

permissions:
  contents: read

jobs:
  docker-build-log:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build and capture output
        id: build
        shell: bash
        run: |
          set +e
          docker build --progress=plain -t ironpage-vault:diagnostic . 2>&1 | tee docker-build.log
          status=${PIPESTATUS[0]}
          echo "status=${status}" >> "$GITHUB_OUTPUT"
          exit "${status}"
      - name: Upload Docker build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docker-build-log
          path: docker-build.log
          if-no-files-found: error
