name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - name: Install Swagger generator
        run: go install github.com/swaggo/swag/cmd/swag@v1.16.4
      - name: Generate Swagger
        run: |
          bash scripts/generate_swagger.sh
          test -f docs/swagger/docs.go
          test -f docs/swagger/swagger.yaml
      - name: Go format
        run: |
          files=$(find . -name '*.go' -not -path './docs/swagger/*' -print)
          unformatted=$(gofmt -l $files)
          if [ -n "$unformatted" ]; then
            echo "gofmt required for:"
            echo "$unformatted"
            exit 0
          fi
      - name: Go vet
        run: go vet ./...
      - name: Go tests
        run: go test -mod=mod ./...
      - name: Static rules
        run: bash unit_tests/test_rules.sh
      - name: Docker build
        run: docker build -t ironpage-vault:ci .
      - name: Prepare Docker acceptance dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils python3-pip
          python3 -m pip install --user --break-system-packages reportlab pypdf pillow
      - name: Docker acceptance
        run: bash scripts/docker_acceptance.sh
