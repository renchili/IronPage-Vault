name: Repository Verification

on:
  pull_request:
  merge_group:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      unlock_failed_revision:
        description: Allow one reviewed manual replay of the same failed revision
        required: false
        default: false
        type: boolean

permissions:
  actions: read
  contents: read
  pull-requests: read

concurrency:
  group: ironpage-verification-${{ github.repository }}-${{ github.event.pull_request.number && format('pr-{0}', github.event.pull_request.number) || github.event.merge_group.head_ref || github.ref_name }}
  cancel-in-progress: false

jobs:
  verification:
    name: Serialized fail-fast verification
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      IRONPAGE_CI_TARGET: ${{ github.event.pull_request.number && format('pr-{0}', github.event.pull_request.number) || github.event.merge_group.head_ref || github.ref_name }}
      IRONPAGE_CI_UNLOCK: ${{ github.event_name == 'workflow_dispatch' && inputs.unlock_failed_revision || false }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Enforce target cooldown and failed-revision latch
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python3 ci/ci_execution_guard.py
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Install workflow linter
        run: go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.7
      - name: Validate the single workflow definition
        run: |
          "$(go env GOPATH)/bin/actionlint" -color=false
      - name: Run complete regression in fail-fast order
        run: bash ci/run_full_regression.sh artifacts/regression
      - name: Retain successful regression evidence
        uses: actions/upload-artifact@v4
        with:
          name: full-regression-${{ github.sha }}-${{ github.run_id }}
          path: artifacts/regression
          if-no-files-found: error
          retention-days: 90
      - name: Publish successful regression summary
        run: cat artifacts/regression/summary.md >> "$GITHUB_STEP_SUMMARY"
