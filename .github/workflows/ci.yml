name: Pull Request CI

on:
  pull_request:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: pr-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changed areas
    runs-on: ubuntu-latest
    outputs:
      swagger: ${{ steps.filter.outputs.swagger }}
      format: ${{ steps.filter.outputs.format }}
      core: ${{ steps.filter.outputs.core }}
      platform: ${{ steps.filter.outputs.platform }}
      service: ${{ steps.filter.outputs.service }}
      app: ${{ steps.filter.outputs.app }}
      repository: ${{ steps.filter.outputs.repository }}
      static_rules: ${{ steps.filter.outputs.static_rules }}
      docker_build: ${{ steps.filter.outputs.docker_build }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            swagger:
              - 'cmd/server/main.go'
              - 'internal/app/server.go'
              - 'internal/app/swagger_*.go'
              - 'scripts/generate_swagger.sh'
              - 'docs/swagger/**'
              - 'go.mod'
              - 'go.sum'
            format:
              - '**/*.go'
            core:
              - 'internal/core/**'
              - 'go.mod'
              - 'go.sum'
            platform:
              - 'internal/platform/**'
              - 'go.mod'
              - 'go.sum'
            service:
              - 'internal/service/**'
              - 'internal/platform/**'
              - 'go.mod'
              - 'go.sum'
            app:
              - 'cmd/**'
              - 'internal/app/**'
              - 'internal/core/**'
              - 'internal/platform/**'
              - 'internal/service/**'
              - 'internal/repository/**'
              - 'internal/store/**'
              - 'migrations/**'
              - 'go.mod'
              - 'go.sum'
            repository:
              - 'internal/repository/**'
              - 'internal/store/**'
              - 'migrations/**'
              - 'go.mod'
              - 'go.sum'
            static_rules:
              - '.github/workflows/**'
              - 'ci/**'
              - 'scripts/**'
              - 'API_tests/**'
              - 'unit_tests/**'
              - 'run_tests.sh'
              - 'internal/**'
              - 'cmd/**'
              - 'migrations/**'
              - 'docs/**'
              - 'public/**'
              - 'go.mod'
              - 'go.sum'
            docker_build:
              - 'Dockerfile'
              - 'docker-compose.yml'
              - '.dockerignore'
              - 'cmd/**'
              - 'internal/**'
              - 'migrations/**'
              - 'public/**'
              - 'scripts/**'
              - 'go.mod'
              - 'go.sum'

  change-impact:
    name: Change impact and coverage gate
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Analyze changed surface and required coverage
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: bash ci/change_impact_check.sh

  swagger:
    name: Swagger contract
    needs: changes
    if: needs.changes.outputs.swagger == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - run: go install github.com/swaggo/swag/cmd/swag@v1.16.4
      - run: |
          bash scripts/generate_swagger.sh
          bash ci/swagger_contract_check.sh

  format:
    name: Go format
    needs: changes
    if: needs.changes.outputs.format == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check changed Go source formatting
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          mapfile -t files < <(git diff --name-only "$BASE_SHA"...HEAD -- '*.go')
          test "${#files[@]}" -gt 0
          gofmt -l "${files[@]}" | tee /tmp/gofmt.out
          test ! -s /tmp/gofmt.out

  core:
    name: Core tests and vet
    needs: changes
    if: needs.changes.outputs.core == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - run: go vet ./internal/core
      - run: go test -mod=mod ./internal/core

  platform:
    name: Platform tests and vet
    needs: changes
    if: needs.changes.outputs.platform == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - run: go vet ./internal/platform
      - run: go test -mod=mod ./internal/platform

  service:
    name: Service tests
    needs: changes
    if: needs.changes.outputs.service == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - run: go test -mod=mod ./internal/service

  app:
    name: App tests
    needs: changes
    if: needs.changes.outputs.app == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - run: go install github.com/swaggo/swag/cmd/swag@v1.16.4
      - run: bash scripts/generate_swagger.sh
      - run: go test -mod=mod ./internal/app ./cmd/...

  repository:
    name: Repository tests
    needs: changes
    if: needs.changes.outputs.repository == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - run: go test -mod=mod ./internal/repository ./internal/store

  static-rules:
    name: CI static guards
    needs: changes
    if: needs.changes.outputs.static_rules == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check shell script syntax without executing project test entrypoints
        run: bash ci/shell_syntax_check.sh

  docker-build:
    name: Docker build
    needs: changes
    if: needs.changes.outputs.docker_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t ironpage-vault:pr .
