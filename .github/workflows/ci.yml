name: Repository Static Acceptance

on:
  pull_request:
  merge_group:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      unlock_failed_revision:
        description: Allow one reviewed manual replay of the same failed revision
        required: false
        default: false
        type: boolean

permissions:
  actions: read
  contents: read
  pull-requests: read

concurrency:
  group: ironpage-static-acceptance-${{ github.repository }}-${{ github.event.pull_request.number && format('pr-{0}', github.event.pull_request.number) || github.event.merge_group.head_ref || github.ref_name }}
  cancel-in-progress: false

jobs:
  static-acceptance:
    name: Serialized static acceptance
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      IRONPAGE_CI_TARGET: ${{ github.event.pull_request.number && format('pr-{0}', github.event.pull_request.number) || github.event.merge_group.head_ref || github.ref_name }}
      IRONPAGE_CI_UNLOCK: ${{ github.event_name == 'workflow_dispatch' && inputs.unlock_failed_revision || false }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          show-progress: false
      - name: Enforce target cooldown and failed-revision latch
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python3 ci/ci_execution_guard.py
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Install workflow linter
        run: go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.7
      - name: Validate workflow syntax
        run: '"$(go env GOPATH)/bin/actionlint" -color=false'
      - name: Validate shell syntax
        run: bash ci/shell_syntax_check.sh
      - name: Validate Python syntax
        run: python3 -m py_compile ci/ci_execution_guard.py ci/source_inventory.py tests/api/ui_interaction_cdp.py
      - name: Validate Go formatting
        run: |
          find cmd internal -name '*.go' -print0 | xargs -0 gofmt -l | tee /tmp/ironpage-gofmt.out
          test ! -s /tmp/ironpage-gofmt.out
      - name: Validate tracked source inventory
        run: python3 ci/source_inventory.py /tmp/ironpage-source-inventory.json
      - name: Validate documentation consistency
        run: bash ci/docs_consistency_check.sh
      - name: Validate repository contracts
        run: bash tests/contracts/repository_rules.sh
      - name: Validate structure contracts
        run: bash tests/contracts/structure_rules.sh
      - name: Validate scheduled backup contracts
        run: bash ci/scheduled_backup_contract_check.sh
      - name: Validate metadata storage contracts
        run: bash ci/metadata_storage_check.sh
      - name: Validate Swagger route coverage
        run: bash tests/contracts/swagger_route_coverage.sh
