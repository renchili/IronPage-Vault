name: Repository Static Acceptance

run-name: >-
  static-${{ github.event_name == 'workflow_dispatch' && inputs.target != '' && inputs.target || github.event.pull_request.number && format('pr-{0}', github.event.pull_request.number) || github.event.merge_group.head_ref || github.ref_name }}
  ${{ github.event_name == 'workflow_dispatch' && inputs.unlock_failed_run_id != '' && format('unlock-{0}', inputs.unlock_failed_run_id) || 'automatic' }}

on:
  pull_request:
  merge_group:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: Canonical target for the selected ref, such as pr-112 or main
        required: true
        type: string
      unlock_failed_run_id:
        description: Exact failed run ID authorized for one replay of the same revision
        required: false
        default: ''
        type: string
      unlock_reason:
        description: Reviewed reason for the one-time replay
        required: false
        default: ''
        type: string

permissions:
  actions: write
  contents: read
  pull-requests: read

concurrency:
  group: ironpage-static-acceptance-${{ github.repository }}-${{ github.event_name == 'workflow_dispatch' && inputs.target != '' && inputs.target || github.event.pull_request.number && format('pr-{0}', github.event.pull_request.number) || github.event.merge_group.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  admission:
    name: Static acceptance admission
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      IRONPAGE_CI_TARGET: ${{ github.event_name == 'workflow_dispatch' && inputs.target != '' && inputs.target || github.event.pull_request.number && format('pr-{0}', github.event.pull_request.number) || github.event.merge_group.head_ref || github.ref_name }}
      IRONPAGE_CI_UNLOCK_RUN_ID: ${{ github.event_name == 'workflow_dispatch' && inputs.unlock_failed_run_id || '' }}
      IRONPAGE_CI_UNLOCK_REASON: ${{ github.event_name == 'workflow_dispatch' && inputs.unlock_reason || '' }}
    steps:
      - name: Admit one target revision without checking out repository code
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const currentRunId = Number(context.runId);
            const currentAttempt = Number(process.env.GITHUB_RUN_ATTEMPT || '1');
            const target = (process.env.IRONPAGE_CI_TARGET || '').trim();
            const unlockRunId = (process.env.IRONPAGE_CI_UNLOCK_RUN_ID || '').trim();
            const unlockReason = (process.env.IRONPAGE_CI_UNLOCK_REASON || '').trim();
            const cooldownMs = 10 * 60 * 1000;
            const failedConclusions = new Set(['failure', 'timed_out', 'action_required']);

            async function cancelCurrent(message) {
              core.error(message);
              await github.rest.actions.cancelWorkflowRun({owner, repo, run_id: currentRunId});
            }

            function runTarget(run) {
              const title = String(run.display_title || '');
              const titleMatch = /^static-(.+)\s+(?:automatic|unlock-\d+)$/.exec(title);
              if (titleMatch) {
                return titleMatch[1];
              }
              if (Array.isArray(run.pull_requests) && run.pull_requests.length > 0) {
                return `pr-${run.pull_requests[0].number}`;
              }
              return String(run.head_branch || '');
            }

            if (!target || /\s/.test(target)) {
              await cancelCurrent('CI target must be a non-empty canonical key without whitespace.');
              return;
            }
            if (currentAttempt > 1) {
              await cancelCurrent('GitHub rerun attempts are not admitted; use a new revision or a one-time workflow_dispatch authorization.');
              return;
            }

            const current = await github.rest.actions.getWorkflowRun({owner, repo, run_id: currentRunId});
            const workflowId = current.data.workflow_id;
            const currentSha = String(current.data.head_sha || '').trim();
            const currentBranch = String(current.data.head_branch || '').trim();
            if (!currentSha || !currentBranch) {
              await cancelCurrent('Current workflow head revision and branch could not be resolved.');
              return;
            }

            if (context.eventName === 'workflow_dispatch') {
              const prMatch = /^pr-(\d+)$/.exec(target);
              if (prMatch) {
                const pullNumber = Number(prMatch[1]);
                const pull = await github.rest.pulls.get({owner, repo, pull_number: pullNumber});
                const canonicalTarget = `pr-${pull.data.number}`;
                const sameRevision = String(pull.data.head.sha || '') === currentSha;
                const sameBranch = String(pull.data.head.ref || '') === currentBranch;
                const sameRepository = String(pull.data.head.repo?.full_name || '') === `${owner}/${repo}`;
                if (pull.data.state !== 'open' || canonicalTarget !== target || !sameRevision || !sameBranch || !sameRepository) {
                  await cancelCurrent(`Manual target ${target} does not identify the selected repository ref and exact open PR revision.`);
                  return;
                }
              } else if (target !== currentBranch) {
                await cancelCurrent(`Manual target ${target} must equal the selected branch ${currentBranch}.`);
                return;
              }
            }

            const runs = await github.paginate(github.rest.actions.listWorkflowRuns, {
              owner,
              repo,
              workflow_id: workflowId,
              per_page: 100,
            });
            const previous = runs
              .filter(run => Number(run.id) !== currentRunId)
              .filter(run => runTarget(run) === target)
              .sort((left, right) => {
                const leftTime = Date.parse(left.run_started_at || left.created_at || 0);
                const rightTime = Date.parse(right.run_started_at || right.created_at || 0);
                return rightTime - leftTime;
              });

            for (const run of previous.filter(run => run.status === 'queued' || run.status === 'in_progress')) {
              await github.rest.actions.cancelWorkflowRun({owner, repo, run_id: run.id});
              core.notice(`Cancelled superseded active run ${run.id} for ${target}.`);
            }

            const failedSameRevision = previous.filter(run =>
              run.head_sha === currentSha && failedConclusions.has(run.conclusion)
            );

            if (unlockRunId) {
              if (context.eventName !== 'workflow_dispatch') {
                await cancelCurrent('Unlock authorization is valid only for workflow_dispatch.');
                return;
              }
              if (!/^\d+$/.test(unlockRunId)) {
                await cancelCurrent('unlock_failed_run_id must be a numeric GitHub Actions run ID.');
                return;
              }
              if (unlockReason.length < 12) {
                await cancelCurrent('unlock_reason must contain a reviewed explanation of at least 12 characters.');
                return;
              }

              const authorizedRun = failedSameRevision.find(run => Number(run.id) === Number(unlockRunId));
              if (!authorizedRun) {
                await cancelCurrent(`Run ${unlockRunId} is not a failed run for target ${target} at revision ${currentSha}.`);
                return;
              }

              const marker = `unlock-${unlockRunId}`;
              const alreadyConsumed = previous.some(run =>
                run.event === 'workflow_dispatch' &&
                run.conclusion !== 'cancelled' &&
                String(run.display_title || '').includes(marker)
              );
              if (alreadyConsumed) {
                await cancelCurrent(`One-time unlock for failed run ${unlockRunId} has already been consumed.`);
                return;
              }

              core.notice(`Accepted one-time unlock for failed run ${unlockRunId}: ${unlockReason}`);
            } else if (failedSameRevision.length > 0) {
              await cancelCurrent(`Revision ${currentSha} is latched by failed run ${failedSameRevision[0].id}; push a new revision or authorize that exact run once.`);
              return;
            } else {
              const latestCompletedSameRevision = previous.find(run =>
                run.head_sha === currentSha &&
                run.status === 'completed' &&
                run.conclusion &&
                run.conclusion !== 'cancelled' &&
                run.conclusion !== 'skipped'
              );
              if (latestCompletedSameRevision) {
                const startedAt = Date.parse(latestCompletedSameRevision.run_started_at || latestCompletedSameRevision.created_at || 0);
                const remainingMs = cooldownMs - (Date.now() - startedAt);
                if (remainingMs > 0) {
                  const remainingSeconds = Math.ceil(remainingMs / 1000);
                  await cancelCurrent(`Revision ${currentSha} is inside the ten-minute same-revision admission cooldown (${remainingSeconds}s remaining).`);
                  return;
                }
              }
            }

            core.notice(`Admitted static acceptance for ${target} at ${currentSha}.`);

  static-acceptance:
    name: Serialized static acceptance
    needs: admission
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          show-progress: false
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Install workflow linter
        run: go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.7
      - name: Validate workflow syntax
        run: '"$(go env GOPATH)/bin/actionlint" -color=false'
      - name: Validate shell syntax
        run: bash ci/shell_syntax_check.sh
      - name: Validate Python syntax
        run: python3 -m py_compile ci/source_inventory.py tests/api/ui_interaction_cdp.py
      - name: Validate Go formatting
        run: |
          find cmd internal -name '*.go' -print0 | xargs -0 gofmt -l | tee /tmp/ironpage-gofmt.out
          test ! -s /tmp/ironpage-gofmt.out
      - name: Validate tracked source inventory
        run: python3 ci/source_inventory.py artifacts/static-acceptance/source-inventory.json
      - name: Validate documentation consistency
        run: bash ci/docs_consistency_check.sh
      - name: Validate repository contracts
        run: bash tests/contracts/repository_rules.sh
      - name: Validate structure contracts
        run: bash tests/contracts/structure_rules.sh
      - name: Validate scheduled backup contracts
        run: bash ci/scheduled_backup_contract_check.sh
      - name: Validate metadata storage contracts
        run: bash ci/metadata_storage_check.sh
      - name: Validate Swagger route coverage
        run: bash tests/contracts/swagger_route_coverage.sh
      - name: Retain successful static inventory
        uses: actions/upload-artifact@v4
        with:
          name: static-source-inventory-${{ github.sha }}-${{ github.run_id }}
          path: artifacts/static-acceptance/source-inventory.json
          if-no-files-found: error
          retention-days: 90
