name: Documentation Consistency

on:
  pull_request:
    paths:
      - '**/*.md'
      - 'docs/**'
      - 'public/**'
      - 'docker-compose.yml'
      - 'ci/docs_consistency_check.sh'
      - '.github/workflows/documentation-consistency.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-consistency-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  documentation-consistency:
    name: Documentation consistency gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check documentation truth and sensitive-value exposure
        run: bash ci/docs_consistency_check.sh
