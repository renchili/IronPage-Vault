name: Post-merge Regression Evidence

on:
  push:
    branches: [main]
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'migrations/**'
      - 'public/**'
      - 'Dockerfile'
      - 'docker-compose.yml'
      - '.dockerignore'
      - 'go.mod'
      - 'go.sum'
      - 'scripts/entrypoint.sh'
      - 'scripts/build_server_in_container.sh'
      - 'scripts/generate_swagger.sh'
      - 'API_tests/**'
      - 'testdata/**'
      - 'ci/run_full_regression.sh'
      - 'ci/docker_acceptance.sh'
      - 'ci/run_project_api_regression.sh'
      - 'ci/Dockerfile.acceptance'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: post-merge-regression-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verification-replay:
    name: Post-merge verification replay
    uses: ./.github/workflows/full-regression-reusable.yml
    with:
      artifact_name: post-merge-regression-${{ github.sha }}-${{ github.run_id }}
      record_summary: true
