name: Post-merge Regression

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: post-merge-regression-${{ github.ref }}
  cancel-in-progress: false

jobs:
  full-regression:
    name: Full regression and Docker acceptance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - name: Install Swagger generator
        run: go install github.com/swaggo/swag/cmd/swag@v1.16.4
      - name: Generate Swagger and verify route contract
        run: |
          bash scripts/generate_swagger.sh
          test -f docs/swagger/docs.go
          test -f docs/swagger/swagger.yaml
          bash unit_tests/test_swagger_route_coverage.sh
      - name: Check Go formatting
        run: |
          find cmd internal -name '*.go' -print0 | xargs -0 gofmt -l | tee /tmp/gofmt.out
          test ! -s /tmp/gofmt.out
      - name: Vet stable packages
        run: |
          go vet ./internal/core
          go vet ./internal/platform
      - name: Run complete Go suite
        run: go test -mod=mod ./...
      - name: Run static and structure rules
        run: |
          bash unit_tests/test_rules.sh
          bash unit_tests/test_structure_rules.sh
      - name: Build runtime image
        run: docker build -t ironpage-vault:main .
      - name: Install Docker acceptance dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils python3-pip
          python3 -m pip install --user --break-system-packages reportlab pypdf pillow
      - name: Run Docker acceptance
        run: bash scripts/docker_acceptance.sh
