name: Reusable Full Regression

on:
  workflow_call:
    inputs:
      artifact_name:
        description: Artifact name for retained regression evidence
        required: true
        type: string
      record_summary:
        description: Publish the generated regression summary to the workflow job summary
        required: false
        default: false
        type: boolean

jobs:
  full-regression:
    name: Full regression
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Run complete regression
        run: bash ci/run_full_regression.sh artifacts/regression
      - name: Upload complete regression evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: artifacts/regression
          if-no-files-found: error
          retention-days: 90
      - name: Publish regression summary
        if: always() && inputs.record_summary
        shell: bash
        run: |
          if [ ! -s artifacts/regression/summary.md ]; then
            echo "ERROR: regression summary is missing" >&2
            exit 1
          fi
          cat artifacts/regression/summary.md >> "$GITHUB_STEP_SUMMARY"
