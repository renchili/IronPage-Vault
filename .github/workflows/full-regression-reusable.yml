name: Reusable Full Regression

on:
  workflow_call:
    inputs:
      artifact_name:
        description: Artifact name for retained regression evidence
        required: true
        type: string
      record_summary:
        description: Commit summary files to main after the run
        required: false
        default: false
        type: boolean

jobs:
  full-regression:
    name: Full regression
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Capture execution context
        run: |
          mkdir -p artifacts/regression
          python3 - <<'PY'
          import json, os
          with open('artifacts/regression/context.json', 'w', encoding='utf-8') as f:
              json.dump({
                  'commit': os.environ['GITHUB_SHA'],
                  'run_id': os.environ['GITHUB_RUN_ID'],
                  'run_attempt': os.environ['GITHUB_RUN_ATTEMPT'],
                  'workflow': os.environ['GITHUB_WORKFLOW'],
                  'repository': os.environ['GITHUB_REPOSITORY'],
              }, f, indent=2)
          PY
      - name: Run complete regression
        id: regression
        continue-on-error: true
        run: bash scripts/run_full_regression.sh artifacts/regression
      - name: Upload complete regression evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: artifacts/regression
          if-no-files-found: error
          retention-days: 90
      - name: Commit regression summary to main
        if: always() && inputs.record_summary && github.ref == 'refs/heads/main'
        env:
          REPORT_DIR: reports/regression/${{ github.sha }}/run-${{ github.run_id }}-attempt-${{ github.run_attempt }}
        run: |
          mkdir -p "$REPORT_DIR"
          cp artifacts/regression/summary.json "$REPORT_DIR/summary.json"
          cp artifacts/regression/summary.md "$REPORT_DIR/summary.md"
          cp artifacts/regression/context.json "$REPORT_DIR/context.json"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$REPORT_DIR"
          git commit -m "test(regression): record ${GITHUB_SHA} run ${GITHUB_RUN_ID} [skip regression]" || exit 0
          git push origin HEAD:main
      - name: Enforce regression result
        if: always()
        env:
          REGRESSION_OUTCOME: ${{ steps.regression.outcome }}
        run: test "$REGRESSION_OUTCOME" = success
