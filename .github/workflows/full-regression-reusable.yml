name: Reusable Full Regression

on:
  workflow_call:

jobs:
  full-regression:
    name: Full regression
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Run complete regression
        id: regression
        continue-on-error: true
        run: bash ci/run_full_regression.sh artifacts/regression
      - name: Upload complete regression evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-evidence
          path: artifacts/regression
          if-no-files-found: error
          retention-days: 90
      - name: Enforce regression result
        if: always()
        env:
          REGRESSION_OUTCOME: success
        run: test "$REGRESSION_OUTCOME" = success
