services:
  ironpage:
    build:
      context: .
      args:
        IRONPAGE_APP_ROOT: ${IRONPAGE_APP_ROOT}
        IRONPAGE_HTTP_PORT: ${HTTP_PORT}
    ports:
      - "${HOST_BIND_ADDRESS}:${HOST_PORT}:${HTTP_PORT}"
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      PGPORT: ${DB_PORT}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      AES_KEY: ${AES_KEY}
      ACCEPTANCE_MODE: ${ACCEPTANCE_MODE}
      BOOTSTRAP_ADMIN_USERNAME: ${BOOTSTRAP_ADMIN_USERNAME}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD}
      SEED_EDITOR_PASSWORD: ${SEED_EDITOR_PASSWORD}
      SEED_REVIEWER_PASSWORD: ${SEED_REVIEWER_PASSWORD}
      STORAGE_DIR: ${STORAGE_DIR}
      BACKUP_DIR: ${BACKUP_DIR}
      MIGRATIONS_DIR: ${MIGRATIONS_DIR}
      PUBLIC_DIR: ${PUBLIC_DIR}
      HTTP_ADDR: ${HTTP_ADDR}
      PGDATA: ${PGDATA}
    volumes:
      - ironpage_pgdata:${POSTGRES_VOLUME_ROOT}
      - ironpage_data:${IRONPAGE_VOLUME_ROOT}
volumes:
  ironpage_pgdata:
  ironpage_data:
