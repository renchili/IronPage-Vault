openapi: 3.0.3
info:
  title: IronPage Vault API
  version: 0.1.0
  description: Offline legal PDF lifecycle management API.
servers:
  - url: http://localhost:8080
paths:
  /healthz:
    get:
      summary: Health check
      responses:
        '200':
          description: Service is healthy
  /api/auth/login:
    post:
      summary: Local username and password login
      responses:
        '200':
          description: Login succeeded
        '401':
          description: Invalid credentials
  /api/auth/logout:
    post:
      summary: Logout and revoke current token
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Logout succeeded
  /api/auth/me:
    get:
      summary: Current authenticated principal
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Principal returned
  /api/documents:
    get:
      summary: List documents
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Document list
    post:
      summary: Upload a PDF document
      security:
        - bearerAuth: []
      responses:
        '201':
          description: Document created
  /api/documents/{id}:
    get:
      summary: Get document metadata
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Document returned
  /api/audit-logs:
    get:
      summary: List audit logs
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Audit log list
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
